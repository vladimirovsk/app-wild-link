<div class="shell">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__brand">
      <svg class="topbar__logo" width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#FF5C00"/>
        <path d="M8 22 L16 10 L24 22" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="16" cy="22" r="2.5" fill="#F8FAFC"/>
      </svg>
      <span class="topbar__name">
        <span class="name-wild">Wild</span><span class="name-link">Link</span>
      </span>
    </div>

    <div class="topbar__right">
      <span class="topbar__view-label">{{ activeView === 'map' ? 'Map View' : activeView === 'devices' ? 'Devices' : 'Module Test' }}</span>

      <button class="btn-logout" (click)="auth.logout()" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </header>

  <!-- Content + sidebar -->
  <div class="workspace">
    <!-- Left sidebar -->
    <nav class="sidebar">
      <button
        class="sidebar__btn"
        [class.sidebar__btn--active]="activeView === 'map'"
        (click)="setView('map')"
        title="Map"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span class="sidebar__label">Map</span>
      </button>

      <button
        class="sidebar__btn"
        [class.sidebar__btn--active]="activeView === 'devices'"
        (click)="setView('devices')"
        title="Devices"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
          <path d="M9 7h6M9 11h4"/>
        </svg>
        <span class="sidebar__label">Devices</span>
      </button>

      <button
        class="sidebar__btn sidebar__btn--test"
        [class.sidebar__btn--active]="activeView === 'test'"
        (click)="setView('test')"
        title="Module Test: htit-wb32-laf-v4.2"
      >
        <div class="sidebar__icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
          </svg>
          <span
            class="sidebar__conn-dot"
            [class.sidebar__conn-dot--open]="(serial.status$ | async) === 'open'"
            [class.sidebar__conn-dot--error]="(serial.status$ | async) === 'error'"
          ></span>
        </div>
        <span class="sidebar__label">TEST</span>
      </button>

      <div class="sidebar__spacer"></div>

      <!-- Settings placeholder -->
      <button class="sidebar__btn sidebar__btn--muted" title="Settings (coming soon)" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="sidebar__label">Settings</span>
      </button>
    </nav>

    <!-- Main content -->
    <main class="content">
      <app-map       *ngIf="activeView === 'map'"></app-map>
      <app-devices   *ngIf="activeView === 'devices'"></app-devices>
      <app-htit-test *ngIf="activeView === 'test'"></app-htit-test>
    </main>
  </div>
</div>
